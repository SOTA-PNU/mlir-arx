stages:
  - build-docker
  - build

variables:
  GIT_SUBMODULE_STRATEGY: recursive


build-docker:
  stage: build-docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile"
      --destination "${DOCKER_USERNAME}/onnxmlir/onnx-mlir-dev:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_USERNAME}/onnxmlir/onnx-mlir-dev:latest"
  rules:
    #    - if: $CI_COMMIT_REF_PROTECTED == "true"
#    - changes:
#        - docker/Dockerfile


build:
  stage: build
  image: ${DOCKER_USERNAME}/onnxmlir/onnx-mlir-dev:latest
  variables:
    WORK_DIR: /workdir
    LLVM_PROJECT_ROOT: ${WORK_DIR}/llvm-project
  before_script:
    - pwd
    - mkdir -p build && cd build
  script:
    - cmake -G ninja -DCMAKE_CXX_COMPILER=/usr/bin/c++ -DCMAKE_BUILD_TYPE=Release -DLLVM_ENABLE_ASSERTIONS=OFF -DMLIR_DIR=/workdir/llvm-project/build/lib/cmake/mlir  ..
    - cmake --build onnx-mlir
    - cmake --build check-onnx-lit


