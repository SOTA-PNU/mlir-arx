stages:
  - docker-build-llvm
  - docker-build-mlir

variables:
  GIT_SUBMODULE_STRATEGY: recursive

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

docker-build-llvm:
  stage: docker-build-llvm
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.llvm-project"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_IMAGE}:latest"
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - docker/Dockerfile.llvm-project
        - .gitlab-ci.yml

docker-build-llvm-no-push:
  stage: docker-build-llvm
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.llvm-project"
      --no-push
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "false"
      changes:
        - docker/Dockerfile.llvm-project
        - .gitlab-ci.yml

docker-build-mlir:
  stage: docker-build-mlir
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.onnx-mlir"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_IMAGE}:latest"
      --build-arg "BASE_IMAGE=onnxmlir/onnx-mlir-llvm-static"
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - docker/Dockerfile.onnx-mlir
        - .gitlab-ci.yml

docker-build-mlir-no-push:
  stage: docker-build-mlir
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.onnx-mlir"
      --build-arg "BASE_IMAGE=onnxmlir/onnx-mlir-llvm-static"
      --no-push
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "false"
      changes:
        - docker/Dockerfile.onnx-mlir
        - .gitlab-ci.yml
