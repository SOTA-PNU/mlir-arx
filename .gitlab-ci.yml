stages:
  - build-docker

variables:
  GIT_SUBMODULE_STRATEGY: recursive


build-docker:
  stage: build-docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${DOCKER_USERNAME}/mlir-arx:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_USERNAME}/mlir-arx:latest"
      --no-push

