stages:
  - build-docker
  - build

variables:
  GIT_SUBMODULE_STRATEGY: recursive

build-docker:
  stage: build-docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - docker/Dockerfile

build-docker-no-push:
  stage: build-docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_IMAGE}:latest"
      --no-push
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "false"
      changes:
        - docker/Dockerfile

build:
  stage: build
  image: ${DOCKER_IMAGE}:latest
  variables:
    WORK_DIR: /workdir
    LLVM_PROJECT_ROOT: ${WORK_DIR}/llvm-project
    NPROC: 40
    ACCEL: ARX

  before_script:
    - pwd
    - mkdir -p build && cd build
    - export PATH=$PATH:/builds/ones-ai/mlir-arx/build/Release/bin
  script:
    - ls
    - cmake -G Ninja -DCMAKE_CXX_COMPILER=/usr/bin/c++ \
        -DCMAKE_BUILD_TYPE=Release \
        -DLLVM_ENABLE_ASSERTIONS=OFF \
        -DMLIR_DIR=/workdir/llvm-project/build/lib/cmake/mlir \
        -DLLVM_DIR=/workdir/llvm-project/build/lib/cmake/llvm \
        -DONNX_MLIR_ACCELERATORS=${ACCEL} ..
    - cmake --build .
    - cmake --build onnx-mlir-opt

    - cd /builds/ones-ai/mlir-arx/test/mlir-arx
    - python3 run.py
    # - cmake --build . --target onnx-mlir
    # - cmake --build . --target onnx-mlir-opt
    # - cmake --build . --target check-onnx-lit
