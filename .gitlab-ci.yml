stages:
  - build-docker
  - build
  - unit-test

default:
  cache:
    key: "arx-$CI_COMMIT_REF_SLUG"
    paths:
      - artifacts/
    policy: pull-push
    
variables:
  GIT_SUBMODULE_STRATEGY: recursive

build-docker:
  stage: build-docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - docker/Dockerfile

build:
  stage: build
  image: ${DOCKER_IMAGE}:latest
  variables:
    WORK_DIR: /workdir
    NPROC: 40
    ACCEL: ARX
    LLVM_PROJECT_ROOT: ${WORK_DIR}/llvm-project
  artifacts:
    paths:
      - artifacts/
    expire_in: 1 week
  before_script:
    - pwd
    - ls
    - ls -l /workdir/
    - ls -l /workdir/llvm-project/
    - mkdir -p build && cd build
  script:
    - ls
    - ls -la /workdir/llvm-project/build/lib/cmake/
    - ls -la /workdir/llvm-project/build/lib/cmake/mlir/ || echo "MLIR cmake dir not found"
    - ls -la /workdir/llvm-project/build/lib/cmake/llvm/ || echo "LLVM cmake dir not found"
    - ls -la /workdir/llvm-project/build/bin/ || echo "LLVM build bin dir not found"
    - /workdir/llvm-project/build/bin/clang++ --version || echo "clang++ version check failed"
    - |
      if [ -d artifacts ]; then
        exit 0;
      fi
    - >
      cmake -G Ninja -DLLVM_DIR=/build/lib/cmake/llvm 
      -DCMAKE_CXX_COMPILER=${LLVM_PROJECT_ROOT}/build/bin/clang++ 
      -DCMAKE_C_COMPILER=${LLVM_PROJECT_ROOT}/build/bin/clang-20 
      -DCMAKE_BUILD_TYPE=Debug -DLLVM_ENABLE_ASSERTIONS=OFF 
      -DMLIR_DIR=${LLVM_PROJECT_ROOT}/build/lib/cmake/mlir 
      -DONNX_MLIR_ACCELERATORS=${ACCEL} 
      -DCMAKE_LIBRARY_PATH=${LLVM_PROJECT_ROOT}/build/lib ..
    - cmake --build .
    - cd ${CI_PROJECT_DIR}
    - mkdir artifacts
    - cp build/Debug/bin/onnx-mlir artifacts/
    - cp build/Debug/bin/onnx-mlir-opt artifacts/
    - cp /workdir/llvm-project/build/bin/mlir-translate artifacts/

unit-test:
  stage: unit-test
  image: ubuntu:24.04
  variables:
    PYTHONUNBUFFERED: "1"
    DEBIAN_FRONTEND: noninteractive
    TZ: Asia/Seoul
  needs:
    - job: build
      artifacts: true

  before_script:
    - apt update && apt-get install -y libprotobuf-dev python3.12 zip
    - export PATH=${CI_PROJECT_DIR}/artifacts:$PATH
  script:
    - cd "test/mlir-arx"
    - python3.12 run.py
  dependencies:
    - build
