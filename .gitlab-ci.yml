stages:
  - docker-build-llvm
  - docker-build-mlir

variables:
  GIT_SUBMODULE_STRATEGY: recursive

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

docker-build-llvm:
  stage: docker-build-llvm
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.llvm-project"
      --destination "onesai1/onnx-mlir-llvm:${CI_COMMIT_REF_NAME}"
      --destination "onesai1/onnx-mlir-llvm:latest"
      --build-arg "NPROC=40"
      --build-arg "LLVM_PROJECT_SHA1=b2cdf3cc4c08729d0ff582d55e40793a20bbcdcc"
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - docker/Dockerfile.llvm-project

docker-build-llvm-no-push:
  stage: docker-build-llvm
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.llvm-project"
      --build-arg "NPROC=40"
      --build-arg "LLVM_PROJECT_SHA1=b2cdf3cc4c08729d0ff582d55e40793a20bbcdcc"
      --no-push
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "false"
      changes:
        - docker/Dockerfile.llvm-project

docker-build-mlir:
  stage: docker-build-mlir
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.onnx-mlir-part"
      --destination "onesai1/onnx-mlir-part:${CI_COMMIT_REF_NAME}"
      --destination "onesai1/onnx-mlir-part:latest"
      --build-arg "BASE_IMAGE=onesai1/onnx-mlir-llvm:latest"
      --build-arg "NPROC=40"
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"

docker-build-mlir-no-push:
  stage: docker-build-mlir
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.onnx-mlir-part"
      --build-arg "BASE_IMAGE=onesai1/onnx-mlir-llvm:latest"
      --build-arg "NPROC=40"
      --no-push
  tags:
    - etri-compute
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "false"
