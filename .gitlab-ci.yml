stages:
  - build-docker
  - build
  - unit-test
  - board-test

variables:
  GIT_SUBMODULE_STRATEGY: recursive

build-docker:
  stage: build-docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - echo "{\"auths\":{\"${DOCKER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${DOCKER_USERNAME}" "${DOCKER_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_REF_NAME}"
      --destination "${DOCKER_IMAGE}:latest"


  rules:
    # 자동 실행: 보호된 브랜치에서 Dockerfile이 변경된 경우
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      changes:
        - docker/Dockerfile
    # 수동 실행: 언제든지 manual trigger로 실행 가능
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
    # 모든 브랜치에서 수동 실행 가능 (manual trigger)
    - when: manual
      allow_failure: true


